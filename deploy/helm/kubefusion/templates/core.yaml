apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.namespace }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubefusion-backend
  namespace: {{ .Values.namespace }}
spec:
  replicas: 2
  selector: { matchLabels: { app: kubefusion-backend } }
  template:
    metadata: { labels: { app: kubefusion-backend } }
    spec:
      serviceAccountName: kubefusion-backend
      containers:
      - name: backend
        image: {{ .Values.image.backend }}
        ports: [{ containerPort: 8080 }]
---
apiVersion: v1
kind: Service
metadata:
  name: kubefusion-backend
  namespace: {{ .Values.namespace }}
spec:
  selector: { app: kubefusion-backend }
  ports: [{ port: 8080, targetPort: 8080 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubefusion-frontend
  namespace: {{ .Values.namespace }}
spec:
  replicas: 2
  selector: { matchLabels: { app: kubefusion-frontend } }
  template:
    metadata: { labels: { app: kubefusion-frontend } }
    spec:
      containers:
      - name: frontend
        image: {{ .Values.image.frontend }}
        ports: [{ containerPort: 80 }]
---
apiVersion: v1
kind: Service
metadata:
  name: kubefusion-frontend
  namespace: {{ .Values.namespace }}
spec:
  selector: { app: kubefusion-frontend }
  ports: [{ port: 80, targetPort: 80 }]
