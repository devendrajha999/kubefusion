version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: kubefusion-postgres
    environment:
      POSTGRES_DB: kubefusion
      POSTGRES_USER: kubefusion
      POSTGRES_PASSWORD: kubefusion
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kubefusion -d kubefusion"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: kubefusion-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: ${BACKEND_IMAGE:-jhadevendra999/backend-image:latest}
    container_name: kubefusion-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      HTTP_ADDR: ":8080"
      POSTGRES_DSN: postgres://kubefusion:kubefusion@postgres:5432/kubefusion?sslmode=disable
      REDIS_ADDR: redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-otel-collector:4317}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: ${FRONTEND_IMAGE:-jhadevendra999/frontend-image:latest}
    container_name: kubefusion-frontend
    depends_on:
      - backend
    ports:
      - "8088:80"

volumes:
  postgres_data:
  redis_data:
