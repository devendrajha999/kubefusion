apiVersion: v1
kind: Secret
metadata:
  name: kubefusion-secrets
  namespace: gitops-platform
type: Opaque
stringData:
  postgres_dsn: postgres://kubefusion:kubefusion@postgres:5432/kubefusion?sslmode=disable
  jwt_secret: replace-with-strong-secret
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kubefusion-config
  namespace: gitops-platform
data:
  HTTP_ADDR: ":8080"
  REDIS_ADDR: "redis:6379"
